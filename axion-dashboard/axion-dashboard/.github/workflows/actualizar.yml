name: Actualizar Dashboard

on:
  # Corre automáticamente todos los días a las 7:00 AM (Uruguay, UTC-3)
  schedule:
    - cron: '0 10 * * *'

  # También corre cada vez que subís un Excel nuevo al repo
  push:
    paths:
      - 'datos/informe_ventas.xlsx'

  # Y permite correrlo manualmente desde GitHub si necesitás
  workflow_dispatch:

jobs:
  procesar:
    runs-on: ubuntu-latest

    steps:
      - name: Bajar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Generar datos.json
        run: python procesar_datos.py

      - name: Publicar cambios al repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "datos: actualización automática $(date +'%Y-%m-%d %H:%M')"
          file_pattern: datos.json
